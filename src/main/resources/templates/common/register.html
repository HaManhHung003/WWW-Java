<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{common/layout :: html(content=~{::section})}">
<body>
    <section>
        <div class="auth-card">
            <h2 style="text-align: center; margin-bottom: 2rem;">Create Account</h2>
            <form th:action="@{/register}" th:object="${user}" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" th:field="*{username}" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" th:field="*{password}" required placeholder="Choose a password">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" th:field="*{confirmPassword}" required placeholder="Confirm your password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem;">
                Already have an account? <a th:href="@{/login}" style="color: var(--primary);">Login</a>
            </p>
        </div>
    </section>
</body>
</html>
