<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{common/layout :: html(content=~{::section})}">
<body>
    <section>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>Manage Books</h1>
            <a th:href="@{/admin/books/add}" class="btn btn-primary">+ Add New Book</a>
        </div>

        <table style="width: 100%; border-collapse: collapse; background: white; border-radius: 1rem; overflow: hidden; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);">
            <thead style="background: #f1f5f9;">
                <tr>
                    <th style="padding: 1rem; text-align: left;">Title</th>
                    <th style="padding: 1rem; text-align: left;">Author</th>
                    <th style="padding: 1rem; text-align: left;">Price</th>
                    <th style="padding: 1rem; text-align: left;">Stock</th>
                    <th style="padding: 1rem; text-align: center;">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="book : ${books}" style="border-top: 1px solid #e2e8f0;">
                    <td style="padding: 1rem;" th:text="${book.title}">Title</td>
                    <td style="padding: 1rem;" th:text="${book.author}">Author</td>
                    <td style="padding: 1rem;" th:text="${'$' + book.price}">$19.99</td>
                    <td style="padding: 1rem;" th:text="${book.quantity}">10</td>
                    <td style="padding: 1rem; text-align: center;">
                        <a th:href="@{'/admin/books/edit/' + ${book.id}}" class="btn" style="background: #e2e8f0; color: #475569; margin-right: 0.5rem;">Edit</a>
                        <a th:href="@{'/admin/books/delete/' + ${book.id}}" class="btn" style="background: #fee2e2; color: #b91c1c;" onclick="return confirm('Are you sure?')">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>
</body>
</html>
