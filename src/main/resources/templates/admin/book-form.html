<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{common/layout :: html(content=~{::section})}">
<body>
    <section>
        <div class="auth-card" style="max-width: 600px;">
            <h2 th:text="${book.id == null ? 'Add New Book' : 'Edit Book'}">Book Form</h2>
            <form th:action="@{/admin/books/save}" th:object="${book}" method="post" style="margin-top: 2rem;">
                <input type="hidden" th:field="*{id}">
                
                <div class="form-group">
                    <label>Book Title</label>
                    <input type="text" th:field="*{title}" required placeholder="Enter title">
                </div>

                <div class="form-group">
                    <label>Author</label>
                    <input type="text" id="author" th:field="*{author}" required placeholder="Enter author name">
                </div>

                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label>AI Generated Description</label>
                        <button type="button" onclick="generateAiDescription()" class="btn" style="background: #e0e7ff; color: #4338ca; padding: 0.25rem 0.75rem; font-size: 0.875rem;">✨ Generate with AI</button>
                    </div>
                    <textarea id="aiDescription" th:field="*{description}" class="form-group" style="width: 100%; height: 100px; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem;"></textarea>
                </div>

                <script>
                    function generateAiDescription() {
                        const title = document.querySelector('input[name="title"]').value;
                        const author = document.getElementById('author').value;
                        if(!title || !author) {
                            alert('Please enter Title and Author first');
                            return;
                        }
                        const btn = event.target;
                        btn.innerText = '⌛ Generating...';
                        fetch(`/admin/books/generate-description?title=${encodeURIComponent(title)}&author=${encodeURIComponent(author)}`)
                            .then(res => res.text())
                            .then(data => {
                                document.getElementById('aiDescription').value = data;
                                btn.innerText = '✨ Generate with AI';
                            })
                            .catch(err => {
                                alert('Error generating description');
                                btn.innerText = '✨ Generate with AI';
                            });
                    }
                </script>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Price ($)</label>
                        <input type="number" step="0.01" th:field="*{price}" required>
                    </div>
                    <div class="form-group">
                        <label>Stock Quantity</label>
                        <input type="number" th:field="*{quantity}" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Cover Image URL</label>
                    <input type="text" th:field="*{coverImage}" placeholder="URL to book cover">
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save Book</button>
                    <a th:href="@{/admin/books}" class="btn" style="background: #e2e8f0; color: #475569; flex: 1; text-align: center; display: flex; align-items: center; justify-content: center;">Cancel</a>
                </div>
            </form>
        </div>
    </section>
</body>
</html>
