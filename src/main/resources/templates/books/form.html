<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${book.id == null ? 'Thêm Sách Mới' : 'Chỉnh Sửa Sách'}">Library Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="card shadow">
    <div class="card-header bg-primary text-white">
        <h2 th:text="${book.id == null ? 'Thêm Sách Mới' : 'Chỉnh Sửa Sách'}"></h2>
    </div>
    <div class="card-body">
        <form th:action="@{/books/save}" th:object="${book}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Tiêu đề sách:</label>
                <input type="text" th:field="*{title}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Tác giả:</label>
                <input type="text" th:field="*{author}" class="form-control" required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Giá (VNĐ):</label>
                    <input type="number" th:field="*{price}" class="form-control" step="0.01" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Năm xuất bản:</label>
                    <input type="number" th:field="*{publishedYear}" class="form-control">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Thể loại:</label>
                <select th:field="*{category}" class="form-select" required>
                    <option value="">-- Chọn thể loại --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}">
                    </option>
                </select>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-success">Lưu lại</button>
                <a th:href="@{/books}" class="btn btn-secondary">Hủy bỏ</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
