# Server configuration
server.port=8080

# Database configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3307/bookstore_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Security configuration (Optional: custom settings)
# spring.security.user.name=admin
# spring.security.user.password=admin

# AI API Keys (Gemini / Groq)
spring.ai.google.ai.api-key=${GEMINI_API_KEY:YOUR_GEMINI_API_KEY}
gemini.api.key=YOUR_GEMINI_API_KEY
groq.api.key=YOUR_GROQ_API_KEY

# Cloudinary configuration (if used)
cloudinary.cloud_name=YOUR_CLOUD_NAME
cloudinary.api_key=YOUR_API_KEY
cloudinary.api_secret=YOUR_API_SECRET
