<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{common/layout :: html(content=~{::section})}">
<body>
    <section>
        <div class="auth-card">
            <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
            <div th:if="${param.error}" style="color: var(--danger); margin-bottom: 1rem; text-align: center;">
                Invalid username or password.
            </div>
            <div th:if="${param.logout}" style="color: var(--secondary); margin-bottom: 1rem; text-align: center;">
                You have been logged out.
            </div>
            <div th:if="${param.success}" style="color: var(--success); margin-bottom: 1rem; text-align: center;">
                Registration successful! Please login.
            </div>
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem;">
                Don't have an account? <a th:href="@{/register}" style="color: var(--primary);">Sign up</a>
            </p>
        </div>
    </section>
</body>
</html>
